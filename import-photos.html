<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 30px; }
.box { background: white; padding: 30px; border-radius: 16px; max-width: 700px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
h2 { color: #601424; margin-bottom: 8px; }
p { color: #6b7280; margin-bottom: 20px; font-size: 0.88rem; }
.btn { background: #601424; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-right: 8px; }
.btn.green { background: #10b981; }
.btn:disabled { background: #9ca3af; cursor: not-allowed; }
.progress { background: #f3f4f6; border-radius: 20px; height: 10px; margin: 16px 0; overflow: hidden; }
.progress-bar { height: 100%; background: #601424; border-radius: 20px; transition: width 0.3s; width: 0%; }
.log { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; height: 300px; overflow-y: auto; font-size: 0.78rem; font-family: monospace; margin-top: 16px; }
.log div { padding: 2px 0; border-bottom: 1px solid #f3f4f6; }
.log .ok { color: #065f46; }
.log .skip { color: #6b7280; }
.log .err { color: #991b1b; }
.summary { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; font-weight: 700; margin-top: 12px; display: none; }
.mode-select { margin-bottom: 16px; display: flex; gap: 12px; }
.mode-select label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
</style>
</head>
<body>
<div class="box">
    <h2>📸 Import Photos Unsplash</h2>
    <p>Recherche une photo unique pour chaque article, sans doublons.</p>

    <div class="mode-select">
        <label><input type="radio" name="mode" value="missing" checked> Articles sans photo uniquement</label>
        <label><input type="radio" name="mode" value="all"> Tous les articles (remplace existantes)</label>
    </div>

    <button class="btn" onclick="startImport()" id="start-btn">🔍 Lancer la recherche</button>
    <button class="btn green" onclick="savePhotos()" id="save-btn" disabled>💾 Sauvegarder les photos</button>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="status" style="font-size:0.82rem;color:#6b7280;margin-bottom:8px;">En attente...</div>
    <div class="log" id="log"></div>
    <div class="summary" id="summary"></div>
</div>

<script>
const db = supabase.createClient(
    'https://mvxqpysdbngyazzzdbkc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12eHFweXNkYm5neWF6enpkYmtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyNzgsImV4cCI6MjA5NjkzNDI3OH0.Y0v4pHdGHF6oGMP4AbTyMjIAZLJk-S7iWL0p_SaRJAs'
);

const UNSPLASH_KEY = 'zgw-EvOABrrk1Mw1qckNyouUui74wXK-jTt9NkrEfwE';

// Requêtes très spécifiques par article pour éviter les doublons
const SPECIFIC_QUERIES = {
    'côtes du rhône': 'cotes du rhone wine bottle',
    'cabernet sauvignon': 'cabernet sauvignon wine pour',
    'brouilly': 'beaujolais wine glass red',

    'riesling': 'riesling white wine glass',

    'bourgogne chardonnay': 'burgundy white wine',

    'menetou salon': 'loire valley wine',
    'sancerre a.o.c': 'sancerre wine glass green',

    'lemon drop': 'lemon drop martini shot',
    'ginger lemon drop': 'ginger shot drink',
    'le port royal': 'rum citrus shot orange',
    'tortuga lime': 'strawberry rum shot pink',
    'barracuda berry': 'blackberry cocktail purple',
    'virgin bellini': 'peach mocktail orange',
    'virgin mojito': 'virgin mojito mint nonalcoholic',
    'lichi spritz': 'lychee pink mocktail',
    'amazon lily': 'tropical hibiscus mocktail red',
    'ginger tatin': 'apple ginger mocktail'
};

function getSearchQuery(name) {
    const lower = name.toLowerCase();
    for (const [key, val] of Object.entries(SPECIFIC_QUERIES)) {
        if (lower.includes(key)) return val;
    }
    return name + ' drink glass';
}

function addLog(msg, type = '') {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.className = type;
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

let updatedProducts = null;

async function startImport() {
    const btn = document.getElementById('start-btn');
    const saveBtn = document.getElementById('save-btn');
    const mode = document.querySelector('input[name="mode"]:checked').value;
    btn.disabled = true;
    btn.textContent = 'Recherche en cours...';
    document.getElementById('log').innerHTML = '';

    const { data, error } = await db.from('state').select('*').eq('key', 'app_state').maybeSingle();
    if (error || !data) { addLog('❌ Impossible de charger la carte', 'err'); btn.disabled = false; return; }

    const state = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
    const products = state.products;
    updatedProducts = [...products];

    // Suivi des photos déjà utilisées pour éviter les doublons
    const usedPhotoIds = new Set();
    products.forEach(p => { if (p.mediaUrl) usedPhotoIds.add(p.mediaUrl); });

    const toProcess = mode === 'all' ? products : products.filter(p => !p.mediaUrl);
    let done = 0, found = 0, skipped = 0;
    const total = toProcess.length;

    document.getElementById('status').textContent = `0 / ${total} articles à traiter`;

    let quotaExceeded = false;

    for (let i = 0; i < updatedProducts.length; i++) {
        if (quotaExceeded) break;

        const p = updatedProducts[i];
        if (mode === 'missing' && p.mediaUrl) { skipped++; continue; }

        const query = getSearchQuery(p.name);
        try {
            const resp = await fetch(
                `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=10&orientation=squarish`,
                { headers: { Authorization: 'Client-ID ' + UNSPLASH_KEY } }
            );

            if (resp.status === 403 || resp.status === 401) {
                quotaExceeded = true;
                addLog(`🛑 Quota Unsplash épuisé (code ${resp.status}). Arrêt — réessayez dans 1 heure.`, 'err');
                break;
            }

            const data = await resp.json();

            if (data.errors) {
                quotaExceeded = true;
                addLog(`🛑 Erreur Unsplash : ${data.errors.join(', ')}. Arrêt — réessayez dans 1 heure.`, 'err');
                break;
            }

            if (data.results && data.results.length > 0) {
                // Trouver la première photo non déjà utilisée
                let chosen = null;
                for (const photo of data.results) {
                    if (!usedPhotoIds.has(photo.urls.regular)) {
                        chosen = photo;
                        break;
                    }
                }
                if (!chosen) chosen = data.results[0]; // Fallback si toutes utilisées

                updatedProducts[i] = { ...p, mediaUrl: chosen.urls.regular, mediaType: 'image' };
                usedPhotoIds.add(chosen.urls.regular);
                addLog(`✅ ${p.name} → photo unique trouvée`, 'ok');
                found++;
            } else {
                addLog(`⚠️ ${p.name} — aucune photo`, 'err');
            }
        } catch(e) {
            addLog(`❌ ${p.name} — erreur réseau`, 'err');
        }

        done++;
        const pct = Math.round((done / total) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('status').textContent = `${done} / ${total} traités — ${found} photos trouvées`;

        await new Promise(r => setTimeout(r, 1300));
    }

    if (quotaExceeded) {
        btn.textContent = '🛑 Arrêté — quota épuisé';
    } else {
        btn.textContent = '✅ Recherche terminée';
    }
    btn.disabled = false;
    saveBtn.disabled = false;
    addLog(`\n📊 Résumé : ${found} photos trouvées, ${skipped} ignorés${quotaExceeded ? ' — ARRÊTÉ PAR QUOTA, relancez dans 1h pour le reste' : ''}`, 'ok');
}

async function savePhotos() {
    if (!updatedProducts) return;
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Sauvegarde...';

    const { data } = await db.from('state').select('*').eq('key', 'app_state').maybeSingle();
    const state = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
    state.products = updatedProducts;

    const { error } = await db.from('state').update({ value: JSON.stringify(state) }).eq('key', 'app_state');
    if (!error) {
        const summary = document.getElementById('summary');
        summary.textContent = '✅ Photos sauvegardées ! Rechargez le menu client pour les voir.';
        summary.style.display = 'block';
        saveBtn.textContent = '✅ Sauvegardé !';
    } else {
        saveBtn.textContent = 'Erreur — réessayer';
        saveBtn.disabled = false;
    }
}
</script>
