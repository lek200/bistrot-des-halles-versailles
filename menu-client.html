<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Bistrot des Halles — Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        :root {
            --burgundy: #601424;
            --cream: #ede2cf;
            --taupe: #b2a48f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); min-height: 100vh; }

        /* SAS */
        .sas-screen { padding: 50px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .sas-logo { width: 80px; height: 80px; background: var(--burgundy); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; margin-bottom: 18px; font-family: 'Playfair Display', serif; }
        .sas-screen h1 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 2rem; margin-bottom: 6px; }
        .sas-screen p { font-size: 0.9rem; color: #6e5d60; margin-bottom: 36px; font-style: italic; }
        .sas-menu-btn { width: 100%; max-width: 340px; background: white; border: 1px solid var(--taupe); padding: 20px; border-radius: 12px; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--burgundy); cursor: pointer; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; transition: background 0.15s; display: block; }
        .sas-menu-btn:hover { background: #f5ede0; }

        /* MENU */
        .menu-screen { display: none; flex-direction: column; min-height: 100vh; }
        .menu-header { background: var(--burgundy); color: white; padding: 10px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; flex-shrink: 0; }
        .btn-back { background: rgba(255,255,255,0.15); color: white; border: none; padding: 7px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .menu-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; flex: 1; }

        /* BARRE SWITCH MENUS */
        .menu-switcher { background: #4a0f1c; display: flex; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; position: sticky; top: 48px; z-index: 9; }
        .menu-switcher::-webkit-scrollbar { display: none; }
        .menu-switch-btn { padding: 10px 18px; border: none; background: none; color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; border-bottom: 3px solid transparent; transition: all 0.15s; }
        .menu-switch-btn.active { color: white; border-bottom-color: var(--cream); background: rgba(255,255,255,0.08); }
        .menu-content { padding: 20px; flex: 1; padding-bottom: 80px; }
        .category-block { margin-bottom: 24px; }
        .category-name { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; border-bottom: 1px solid rgba(96,20,36,0.2); padding-bottom: 4px; }
        .product-item { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed rgba(0,0,0,0.08); }
        .product-info { flex: 1; padding-right: 12px; }
        .product-meta { display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: var(--burgundy); }
        .product-desc { font-size: 0.78rem; color: #55484a; margin-top: 3px; font-style: italic; line-height: 1.4; }
        .btn-add { background: var(--burgundy); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; position: relative; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.95); }
        .product-badge { position: absolute; top: -7px; right: -7px; background: #f59e0b; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }

        /* POPUP SÉLECTION */
        .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .popup-box { background: white; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .popup-product-name { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .popup-product-desc { font-size: 0.8rem; color: #6b7280; font-style: italic; margin-bottom: 20px; }
        .popup-qty-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .popup-qty-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--burgundy); background: white; color: var(--burgundy); font-size: 1.4rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .popup-qty { font-size: 2rem; font-weight: 800; color: var(--burgundy); min-width: 40px; text-align: center; }
        .popup-price { text-align: center; font-size: 1rem; color: #6b7280; margin-bottom: 20px; }
        .popup-price strong { color: var(--burgundy); font-size: 1.2rem; }
        .popup-add-btn { width: 100%; padding: 14px; background: var(--burgundy); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .popup-cancel { width: 100%; padding: 10px; background: none; color: #6b7280; border: none; font-size: 0.88rem; cursor: pointer; margin-top: 8px; }



        /* PANIER */
        /* PANIER MODAL */
        .cart-fab { position: fixed; bottom: 20px; right: 20px; background: var(--burgundy); color: white; border: none; border-radius: 50px; padding: 12px 20px; font-weight: 700; font-size: 0.88rem; cursor: pointer; box-shadow: 0 4px 15px rgba(96,20,36,0.4); display: none; z-index: 200; }
        .history-fab { position: fixed; bottom: 20px; left: 20px; background: #374151; color: white; border: none; border-radius: 50px; padding: 12px 16px; font-weight: 700; font-size: 0.82rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; z-index: 200; }
        .history-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 20px; z-index: 301; max-height: 80vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; }
        .history-modal.open { transform: translateY(0); }
        .history-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .history-modal-title { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.1rem; font-weight: 700; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; }
        .cart-overlay.open { display: block; }
        .cart-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 20px; z-index: 301; max-height: 80vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; }
        .cart-modal.open { transform: translateY(0); }
        .cart-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .cart-modal-title { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.2rem; font-weight: 700; }
        .cart-close { background: #f3f4f6; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
        .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #e5e0d8; font-size: 0.88rem; gap: 8px; }
        .cart-line-name { flex: 1; font-weight: 600; }
        .cart-qty-ctrl { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #f3f4f6; border: 1px solid #d1d5db; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; font-weight: 700; }
        .cart-total-row { display: flex; justify-content: space-between; font-weight: 800; padding-top: 14px; color: var(--burgundy); font-size: 1.1rem; margin-bottom: 14px; }
        .btn-send { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
        .btn-send:disabled { background: #9ca3af; cursor: not-allowed; }
        /* CLIENT NAME */
        .client-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .client-field label { display: block; font-size: 0.78rem; font-weight: 700; color: #6b7280; margin-bottom: 4px; }
        .client-field input, .client-field select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; font-family: inherit; }

        /* NAV CATÉGORIES STICKY */
        .cat-nav { position: sticky; top: 56px; z-index: 50; background: white; border-bottom: 1px solid #e5e0d8; padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-nav-btn { background: none; border: 1.5px solid var(--taupe); color: var(--burgundy); padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s ease; }
        .cat-nav-btn.active { background: var(--burgundy); color: white; border-color: var(--burgundy); box-shadow: 0 3px 10px rgba(96,20,36,0.35); transform: scale(1.05); }

        /* EFFET SECTION ACTIVE */
        .category-block { transition: opacity 0.2s ease; }
        .category-block.highlight { animation: sectionPop 0.4s ease; }
        @keyframes sectionPop {
            0% { opacity: 0.5; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .category-name { position: relative; padding-bottom: 6px; }
        .category-name::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--burgundy); transition: width 0.4s ease; }
        .category-block.in-view .category-name::after { width: 40px; }

        /* TABLE INPUT */
        .table-select { background: #fff8f0; border: 2px solid var(--taupe); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .table-select label { font-weight: 700; font-size: 0.88rem; color: var(--burgundy); display: block; margin-bottom: 8px; }
        .table-select select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }

        /* LOADING */
        .loading { text-align: center; padding: 40px; color: #9ca3af; font-style: italic; }

        /* CONFIRMATION */
        .order-confirm { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px; }
        .order-confirm.show { display: flex; }
        .confirm-icon { font-size: 4rem; margin-bottom: 16px; }
        .order-confirm h2 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.6rem; margin-bottom: 8px; }
        .order-confirm p { color: #6b7280; font-size: 0.9rem; }
        .btn-new-order { margin-top: 24px; background: var(--burgundy); color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }

        /* ── MÉDIAS PRODUIT (digital only) ── */
        .product-media-wrap { position: relative; flex-shrink: 0; }
        .product-img { width: 76px; height: 76px; border-radius: 10px; object-fit: cover; display: block; }
        .product-video { width: 76px; height: 76px; border-radius: 10px; object-fit: cover; display: block; }
        .product-item { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed rgba(0,0,0,0.08); }
        .product-item-info { flex: 1; min-width: 0; }
        .product-item-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

        /* ── PRINT : version papier propre ── */
        @media print {
            .no-print, .btn-add, .cart-bar, .cart-panel,
            .menu-header, .menu-switcher, .cat-nav,
            .product-img, .product-video, .product-media-wrap,
            .popup-overlay, .cart-fab, .table-select,
            .order-confirm { display: none !important; }
            body { background: white !important; }
            .menu-screen { display: block !important; }
            .sas-screen { display: none !important; }
            .menu-content { padding: 24px 30px; }
            .category-block { margin-bottom: 28px; page-break-inside: avoid; }
            .category-name { font-size: 1.4rem; color: #601424; border-bottom: 1.5px solid #b2a48f; padding-bottom: 5px; margin-bottom: 14px; }
            .category-name::after { display: none !important; }
            .product-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px dashed #d1c9b8; gap: 0; }
            .product-item-info { flex: 1; }
            .product-item-actions { display: none !important; }
            .product-meta { font-size: 1rem; font-weight: 700; color: #601424; display: flex; justify-content: space-between; }
            .product-desc { font-size: 0.82rem; color: #55484a; font-style: italic; margin-top: 2px; }
        }
    </style>
</head>
<body>

<!-- SAS -->
<div class="sas-screen" id="view-sas">
    <div class="sas-logo">BH</div>
    <h1>Le Bistrot des Halles</h1>
    <p>Commandez directement depuis votre table</p>
    <div id="sas-buttons" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="loading">Chargement du menu...</div>
    </div>
</div>

<!-- MENU -->
<div class="menu-screen" id="view-menu">
    <div class="menu-header">
        <button class="btn-back" onclick="goBack()">← Retour</button>
        <h2 id="menu-title"></h2>
    </div>
    <div id="menu-switcher" class="menu-switcher"></div>
    <div id="cat-nav" class="cat-nav"></div>
    <div class="menu-content">
        <div class="table-select">
            <label>📍 Votre numéro de table :</label>
            <select id="table-number">
                <option value="">-- Sélectionnez votre table --</option>
                <option value="Table 1">Table 1</option>
                <option value="Table 2">Table 2</option>
                <option value="Table 3">Table 3</option>
                <option value="Table 4">Table 4</option>
                <option value="Table 5">Table 5</option>
                <option value="Table 6">Table 6</option>
                <option value="Table 7">Table 7</option>
                <option value="Table 8">Table 8</option>
                <option value="Bar">Bar</option>
                <option value="Terrasse">Terrasse</option>
            </select>
        </div>
        <div id="menu-items"></div>
    </div>
    <div class="order-confirm" id="order-confirm">
        <div class="confirm-icon">✅</div>
        <h2>Commande envoyée !</h2>
        <p>Le bar a bien reçu votre commande.</p>
        <div style="background:#fff8f0;border:2px solid #b2a48f;border-radius:12px;padding:14px;margin:14px 0;text-align:center;">
            <div style="font-size:0.82rem;color:#6b7280;margin-bottom:4px;">⏱ Temps estimé</div>
            <div id="eta-text" style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#601424;">~10-15 minutes</div>
        </div>
        <!-- HISTORIQUE SESSION -->
        <div id="order-history-wrap" style="width:100%;margin-bottom:14px;display:none;">
            <div style="font-family:'Playfair Display',serif;color:#601424;font-weight:700;font-size:1rem;margin-bottom:8px;text-align:left;">📋 Vos commandes ce soir</div>
            <div id="order-history-list" style="width:100%;"></div>
        </div>
        <button class="btn-new-order" onclick="resetOrder()">+ Nouvelle commande</button>
    </div>
</div>

<!-- BOUTON PANIER FLOTTANT -->
<button class="cart-fab" id="cart-fab" onclick="openCart()">
    🛒 Panier · <span id="cart-total-label">0.00€</span>
    <span id="cart-count" style="background:white;color:var(--burgundy);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;margin-left:6px;">0</span>
</button>

<!-- OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

<!-- BOUTON MES COMMANDES -->
<button class="history-fab" id="history-fab" onclick="openHistory()">📋 Mes commandes</button>

<!-- MODAL HISTORIQUE -->
<div class="cart-overlay" id="history-overlay" onclick="closeHistory()"></div>
<div class="history-modal" id="history-modal">
    <div class="history-modal-header">
        <span class="history-modal-title">📋 Mes commandes</span>
        <button class="cart-close" onclick="closeHistory()">✕</button>
    </div>
    <div id="history-modal-content"></div>
</div>

<!-- MODAL PANIER -->
<div class="cart-modal" id="cart-modal">
    <div class="cart-modal-header">
        <span class="cart-modal-title">🛒 Mon panier</span>
        <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <!-- TABLE : affichage auto si QR, sinon sélection -->
    <div id="table-auto-display" style="display:none;background:#fff8f0;border:1px solid #b2a48f;border-radius:8px;padding:10px;margin-bottom:12px;text-align:center;">
        <span style="font-size:0.78rem;color:#6b7280;">📍 Table détectée automatiquement</span>
        <div id="table-auto-name" style="font-family:'Playfair Display',serif;color:#601424;font-size:1.1rem;font-weight:700;"></div>
    </div>
    <div id="table-manual-select" style="margin-bottom:12px;">
        <label style="display:block;font-size:0.78rem;font-weight:700;color:#6b7280;margin-bottom:4px;">📍 Votre table</label>
        <select id="table-number" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:0.9rem;font-family:inherit;">
            <option value="">-- Sélectionnez votre table --</option>
            <option>Table 1</option><option>Table 2</option><option>Table 3</option>
            <option>Table 4</option><option>Table 5</option><option>Table 6</option>
            <option>Table 7</option><option>Table 8</option><option>Bar</option>
            <option>Terrasse</option>
        </select>
    </div>
    <div style="margin-bottom:12px;">
        <label style="display:block;font-size:0.78rem;font-weight:700;color:#6b7280;margin-bottom:4px;">👤 Votre prénom (optionnel)</label>
        <input type="text" id="client-name" placeholder="Ex: Marie" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:0.9rem;font-family:inherit;">
    </div>
    <div id="cart-lines"></div>
    <div class="cart-total-row"><span>Total</span><span id="cart-grand-total">0.00€</span></div>
    <button class="btn-send" id="btn-send" onclick="sendOrder()">✅ Envoyer la commande</button>
</div>

</div>

<!-- POPUP SÉLECTION PRODUIT -->
<div class="popup-overlay" id="product-popup" style="display:none;" onclick="closePopup(event)">
    <div class="popup-box" onclick="event.stopPropagation()">
        <div class="popup-product-name" id="popup-name"></div>
        <div class="popup-product-desc" id="popup-desc"></div>
        <div class="popup-qty-row">
            <button class="popup-qty-btn" onclick="popupChangeQty(-1)">−</button>
            <span class="popup-qty" id="popup-qty">1</span>
            <button class="popup-qty-btn" onclick="popupChangeQty(1)">+</button>
        </div>
        <div class="popup-price">Total : <strong id="popup-total">0.00€</strong></div>
        <button class="popup-add-btn" onclick="confirmPopupAdd()">🛒 Ajouter au panier</button>
        <button class="popup-cancel" onclick="document.getElementById('product-popup').style.display='none'">Annuler</button>
    </div>
</div>



<script>
const SUPABASE_URL = 'https://mvxqpysdbngyazzzdbkc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12eHFweXNkYm5neWF6enpkYmtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyNzgsImV4cCI6MjA5NjkzNDI3OH0.Y0v4pHdGHF6oGMP4AbTyMjIAZLJk-S7iWL0p_SaRJAs';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let appState = { menus: [], categories: [], products: [] };
let cart = {};
let currentMenuId = null;

// ── INIT ──
async function init() {
    await loadState();
    
    // Détecter table depuis URL
    const params = new URLSearchParams(window.location.search);
    const tableParam = params.get('table');
    if (tableParam) window._detectedTable = tableParam;

    renderSas();
}

async function loadState() {
    try {
        const { data, error } = await db.from('state').select('*').eq('key', 'app_state').maybeSingle();
        if (!error && data && data.value) {
            appState = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
        } else {
            // État par défaut si rien en base
            appState = {
                menus: [
                    { id: "m_vins", name: "La Carte des Vins" },
                    { id: "m_cocktails", name: "Les Cocktails & Boissons" }
                ],
                categories: [
                    { id: "c_rouges", menuId: "m_vins", name: "Vins Rouges" },
                    { id: "c_blancs", menuId: "m_vins", name: "Vins Blancs" },
                    { id: "c_creations", menuId: "m_cocktails", name: "Créations du Chef" },
                    { id: "c_softs", menuId: "m_cocktails", name: "Softs Frais" }
                ],
                products: [
                    { id: "p1", catId: "c_rouges", name: "Saint-Émilion Grand Cru", price: 7.50, desc: "Notes boisées, finale veloutée.", isHidden: false },
                    { id: "p2", catId: "c_blancs", name: "Chablis Artisanal", price: 6.00, desc: "Minéral, frais, idéal fruits de mer.", isHidden: false },
                    { id: "p3", catId: "c_creations", name: "Bistrot Mule Signature", price: 9.50, desc: "Vodka infusée au basilic, Ginger Beer, citron vert.", isHidden: false },
                    { id: "p4", catId: "c_softs", name: "Limonade Maison Menthe", price: 4.00, desc: "Citrons pressés minute, sirop de canne bio.", isHidden: false }
                ]
            };
        }
    } catch(e) { console.error(e); }
}

function renderSas() {
    const c = document.getElementById('sas-buttons');
    c.innerHTML = '';
    appState.menus.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'sas-menu-btn';
        btn.textContent = m.name;
        btn.onclick = () => openMenu(m.id);
        c.appendChild(btn);
    });
}

function openMenu(menuId) {
    currentMenuId = menuId;
    document.getElementById('view-sas').style.display = 'none';
    document.getElementById('view-menu').style.display = 'flex';
    document.getElementById('menu-title').textContent = appState.menus.find(m => m.id === menuId)?.name || '';
    document.getElementById('order-confirm').classList.remove('show');
    document.getElementById('menu-items').style.display = 'block';
    renderMenuSwitcher(menuId);
    renderMenu(menuId);
    updateCartUI();


}

function renderMenuSwitcher(activeMenuId) {
    const switcher = document.getElementById('menu-switcher');
    switcher.innerHTML = '';
    appState.menus.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'menu-switch-btn' + (m.id === activeMenuId ? ' active' : '');
        btn.textContent = m.name;
        btn.onclick = () => switchMenu(m.id);
        switcher.appendChild(btn);
    });
}

function switchMenu(menuId) {
    if (menuId === currentMenuId) return;
    currentMenuId = menuId;
    document.getElementById('menu-title').textContent = appState.menus.find(m => m.id === menuId)?.name || '';
    renderMenuSwitcher(menuId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderMenu(menuId);
}

function goBack() {
    document.getElementById('view-menu').style.display = 'none';
    document.getElementById('view-sas').style.display = 'flex';
    document.getElementById('cart-panel').classList.remove('open');
}

function renderMenu(menuId) {
    const container = document.getElementById('menu-items');
    container.innerHTML = '';
    const nav = document.getElementById('cat-nav');
    nav.innerHTML = '';

    const cats = appState.categories.filter(c => c.menuId === menuId);
    cats.forEach((cat, idx) => {
        const prods = appState.products.filter(p => p.catId === cat.id && !p.isHidden);
        if (!prods.length) return;

        // Bouton nav
        const navBtn = document.createElement('button');
        navBtn.className = 'cat-nav-btn' + (idx === 0 ? ' active' : '');
        navBtn.textContent = cat.name;
        navBtn.onclick = () => scrollToCategory(cat.id);
        navBtn.id = `nav-btn-${cat.id}`;
        nav.appendChild(navBtn);

        // Bloc catégorie avec ancre
        const block = document.createElement('div');
        block.className = 'category-block';
        block.id = `cat-${cat.id}`;
        block.innerHTML = `<div class="category-name">${cat.name}</div>`;
        prods.forEach(p => {
            const media = p.mediaUrl ? (
                            p.mediaType === 'video'
                            ? `<div class="product-media-wrap no-print"><video class="product-video" src="${p.mediaUrl}" autoplay loop muted playsinline></video></div>`
                            : `<div class="product-media-wrap no-print"><img class="product-img" src="${p.mediaUrl}" alt="${p.name}" loading="lazy"></div>`
                        ) : '';
                        block.innerHTML += `
                <div class="product-item">
                    ${media}
                    <div class="product-item-info">
                        <div class="product-meta"><span>${p.name}</span><span>${parseFloat(p.price).toFixed(2)}€</span></div>
                        <div class="product-desc">${p.desc}</div>
                    </div>
                    <div class="product-item-actions no-print">
                        <button class="btn-add" data-product-id="${p.id}" onclick="addToCart('${p.id}')">+ Ajouter${cart[p.id] ? `<span class="product-badge">${cart[p.id]}</span>` : ''}</button>
                    </div>
                </div>`;
        });
        container.appendChild(block);
    });

    // Observer pour mettre à jour le bouton actif au scroll
    observeCategories(cats);
}



function observeCategories(cats) {
    if (window._catObserver) window._catObserver.disconnect();
    const options = { root: null, rootMargin: '-110px 0px -55% 0px', threshold: 0 };
    window._catObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            const catId = entry.target.id.replace('cat-', '');
            if (entry.isIntersecting) {
                // Activer bouton nav
                document.querySelectorAll('.cat-nav-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById(`nav-btn-${catId}`);
                if (activeBtn) {
                    activeBtn.classList.add('active');
                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
                // Effet visuel section
                document.querySelectorAll('.category-block').forEach(b => b.classList.remove('in-view'));
                entry.target.classList.add('in-view');
            }
        });
    }, options);
    cats.forEach(cat => {
        const el = document.getElementById(`cat-${cat.id}`);
        if (el) window._catObserver.observe(el);
    });
}

function scrollToCategory(catId) {
    const el = document.getElementById(`cat-${catId}`);
    if (!el) return;
    const offset = 150;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
    // Effet highlight sur la section ciblée
    el.classList.remove('highlight');
    void el.offsetWidth; // reset animation
    el.classList.add('highlight');
    setTimeout(() => el.classList.remove('highlight'), 500);
}

// ── POPUP PRODUIT ──
let popupProductId = null;
let popupQty = 1;

function addToCart(id) {
    const p = appState.products.find(x => x.id === id);
    if (!p) return;
    popupProductId = id;
    popupQty = 1;
    document.getElementById('popup-name').textContent = p.name;
    document.getElementById('popup-desc').textContent = p.desc;
    document.getElementById('popup-qty').textContent = 1;
    document.getElementById('popup-total').textContent = parseFloat(p.price).toFixed(2) + '€';
    document.getElementById('product-popup').style.display = 'flex';
}

function closePopup(e) {
    document.getElementById('product-popup').style.display = 'none';
}

function popupChangeQty(delta) {
    const p = appState.products.find(x => x.id === popupProductId);
    popupQty = Math.max(1, popupQty + delta);
    document.getElementById('popup-qty').textContent = popupQty;
    document.getElementById('popup-total').textContent = (parseFloat(p.price) * popupQty).toFixed(2) + '€';
}

function confirmPopupAdd() {
    if (!popupProductId) return;
    cart[popupProductId] = (cart[popupProductId] || 0) + popupQty;
    document.getElementById('product-popup').style.display = 'none';
    updateCartUI();
    updateProductBadges();
}

function changeQty(id, delta) {
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) delete cart[id];
    updateCartUI();
    updateProductBadges();
}

function updateCartUI() {
    const items = Object.entries(cart);
    const total = items.reduce((s, [id, qty]) => {
        const p = appState.products.find(x => x.id === id);
        return s + (p ? parseFloat(p.price) * qty : 0);
    }, 0);
    const count = items.reduce((s, [, q]) => s + q, 0);

    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-total-label').textContent = total.toFixed(2) + '€';
    document.getElementById('cart-grand-total').textContent = total.toFixed(2) + '€';

    // FAB
    const fab = document.getElementById('cart-fab');
    if (fab) fab.style.display = count > 0 ? 'flex' : 'none';

    const lines = document.getElementById('cart-lines');
    lines.innerHTML = '';
    if (!items.length) {
        lines.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:12px;font-size:0.85rem;">Panier vide</p>';
    } else {
        items.forEach(([id, qty]) => {
            const p = appState.products.find(x => x.id === id);
            if (!p) return;
            lines.innerHTML += `
                <div class="cart-line">
                    <span class="cart-line-name">${p.name}</span>
                    <div class="cart-qty-ctrl">
                        <button class="btn-qty" onclick="changeQty('${id}',-1)">−</button>
                        <span style="min-width:18px;text-align:center;font-weight:700;">${qty}</span>
                        <button class="btn-qty" onclick="changeQty('${id}',1)">+</button>
                        <span style="min-width:48px;text-align:right;font-weight:600;">${(parseFloat(p.price)*qty).toFixed(2)}€</span>
                    </div>
                </div>`;
        });
    }
}

function openCart() {
    document.getElementById('cart-modal').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');

    const detected = window._detectedTable;
    const autoDisplay = document.getElementById('table-auto-display');
    const manualSelect = document.getElementById('table-manual-select');
    const autoName = document.getElementById('table-auto-name');

    if (detected) {
        // Mode automatique : afficher le nom, cacher le select
        autoDisplay.style.display = 'block';
        manualSelect.style.display = 'none';
        autoName.textContent = detected;
    } else {
        // Mode manuel : cacher l'auto, afficher le select
        autoDisplay.style.display = 'none';
        manualSelect.style.display = 'block';
    }
}

function closeCart() {
    document.getElementById('cart-modal').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
}

function openHistory() {
    const modal = document.getElementById('history-modal');
    const overlay = document.getElementById('history-overlay');
    const container = document.getElementById('history-modal-content');
    if (!modal) return;

    const hist = JSON.parse(sessionStorage.getItem('order_history') || '[]');
    if (!hist.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af;font-style:italic;">Aucune commande passée ce soir.</div>';
    } else {
        let html = '';
        let grandTotal = 0;
        hist.forEach((entry, i) => {
            grandTotal += entry.total;
            const itemsStr = entry.items.map(it => it.qty + 'x ' + it.name).join(', ');
            html += '<div style="background:#fff8f0;border:1px solid #e5d9c8;border-radius:10px;padding:12px;margin-bottom:10px;">'
                + '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:0.88rem;color:#601424;">'
                + '<span>Commande ' + (i+1) + ' · ' + entry.time + '</span>'
                + '<span>' + entry.total.toFixed(2) + '€</span></div>'
                + '<div style="font-size:0.78rem;color:#6b7280;margin-top:2px;">📍 ' + entry.table + '</div>'
                + '<div style="font-size:0.82rem;margin-top:6px;color:#374151;line-height:1.5;">' + itemsStr + '</div>'
                + '</div>';
        });
        if (hist.length > 1) {
            html += '<div style="display:flex;justify-content:space-between;font-weight:800;padding:12px 0;border-top:2px solid #601424;color:#601424;font-size:1rem;margin-top:4px;">'
                + '<span>Total de la soirée</span><span>' + grandTotal.toFixed(2) + '€</span></div>';
        }
        container.innerHTML = html;
    }

    modal.classList.add('open');
    overlay.classList.add('open');
}

function closeHistory() {
    document.getElementById('history-modal').classList.remove('open');
    document.getElementById('history-overlay').classList.remove('open');
}

function updateProductBadges() {
    // Mettre à jour les badges sur les boutons "Ajouter"
    document.querySelectorAll('[data-product-id]').forEach(btn => {
        const id = btn.getAttribute('data-product-id');
        const qty = cart[id] || 0;
        let badge = btn.querySelector('.product-badge');
        if (qty > 0) {
            if (!badge) { badge = document.createElement('span'); badge.className = 'product-badge'; btn.appendChild(badge); }
            badge.textContent = qty;
        } else if (badge) {
            badge.remove();
        }
    });
}

async function sendOrder() {
    const detected = window._detectedTable;
    const table = detected || document.getElementById('table-number').value;
    if (!table) return alert('Veuillez sélectionner votre numéro de table.');
    const clientName = document.getElementById('client-name').value.trim();
    const items = Object.entries(cart);
    if (!items.length) return alert('Votre panier est vide.');

    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours...';

    const orderItems = items.map(([id, qty]) => {
        const p = appState.products.find(x => x.id === id);
        return { productId: id, name: p?.name, price: parseFloat(p?.price), qty };
    });

    const total = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
    const tableLabel = clientName ? table + ' — ' + clientName : table;

    await db.from('orders').insert({
        table_number: tableLabel,
        items: orderItems,
        total: total,
        status: 'pending',
        created_at: new Date().toISOString()
    });

    // Calculer ETA basé sur le nombre de commandes en cours
    const { data: activeOrders } = await db.from('orders')
        .select('id').in('status', ['pending', 'preparing']);
    const queueSize = (activeOrders || []).length;
    const etaMin = Math.max(5, 5 + queueSize * 2);
    const etaMax = etaMin + 5;

    // Afficher confirmation avec ETA
    document.getElementById('eta-text').textContent = `~${etaMin}-${etaMax} minutes`;
    // Historique session
    const histEntry = { time: new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}), table: tableLabel, items: orderItems, total: total };
    const hist = JSON.parse(sessionStorage.getItem('order_history') || '[]');
    hist.push(histEntry);
    sessionStorage.setItem('order_history', JSON.stringify(hist));
    // Afficher bouton "Mes commandes"
    const hFab = document.getElementById('history-fab');
    if (hFab) hFab.style.display = 'flex';

    document.getElementById('menu-items').style.display = 'none';
    document.getElementById('menu-switcher').style.display = 'none';
    document.getElementById('cat-nav').style.display = 'none';
    closeCart();
    document.getElementById('order-confirm').classList.add('show');
    renderOrderHistory();

    btn.disabled = false;
    btn.textContent = '✅ Envoyer la commande';
    cart = {};
    updateCartUI();
}

function resetOrder() {
    document.getElementById('menu-switcher').style.display = 'flex';
    document.getElementById('cat-nav').style.display = 'flex';
    document.getElementById('menu-items').style.display = 'block';
    document.getElementById('order-confirm').classList.remove('show');
    cart = {};
    updateCartUI();
}

function renderOrderHistory() {
    const wrap = document.getElementById('order-history-wrap');
    const list = document.getElementById('order-history-list');
    if (!wrap || !list) return;
    const hist = JSON.parse(sessionStorage.getItem('order_history') || '[]');
    if (!hist.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    list.innerHTML = '';
    let grandTotal = 0;
    hist.forEach((entry, i) => {
        grandTotal += entry.total;
        const div = document.createElement('div');
        div.style.cssText = 'background:#fff8f0;border:1px solid #e5d9c8;border-radius:8px;padding:10px;margin-bottom:8px;text-align:left;';
        const itemsStr = entry.items.map(it => it.qty + '× ' + it.name).join(', ');
        div.innerHTML = '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:0.85rem;color:#601424;">'
            + '<span>Commande ' + (i+1) + ' · ' + entry.time + '</span>'
            + '<span>' + entry.total.toFixed(2) + '€</span></div>'
            + '<div style="font-size:0.78rem;color:#6b7280;margin-top:3px;">' + entry.table + '</div>'
            + '<div style="font-size:0.8rem;margin-top:4px;">' + itemsStr + '</div>';
        list.appendChild(div);
    });
    if (hist.length > 1) {
        list.innerHTML += '<div style="display:flex;justify-content:space-between;font-weight:800;padding:8px 0;border-top:2px solid #601424;color:#601424;font-size:0.95rem;">'
            + '<span>Total de la soirée</span><span>' + grandTotal.toFixed(2) + '€</span></div>';
    }
}
