<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Bistrot des Halles — Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        :root {
            --burgundy: #601424;
            --cream: #ede2cf;
            --taupe: #b2a48f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); min-height: 100vh; }

        /* SAS */
        .sas-screen { padding: 50px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .sas-logo { width: 80px; height: 80px; background: var(--burgundy); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; margin-bottom: 18px; font-family: 'Playfair Display', serif; }
        .sas-screen h1 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 2rem; margin-bottom: 6px; }
        .sas-screen p { font-size: 0.9rem; color: #6e5d60; margin-bottom: 36px; font-style: italic; }
        .sas-menu-btn { width: 100%; max-width: 340px; background: white; border: 1px solid var(--taupe); padding: 20px; border-radius: 12px; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--burgundy); cursor: pointer; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; transition: background 0.15s; display: block; }
        .sas-menu-btn:hover { background: #f5ede0; }

        /* MENU */
        .menu-screen { display: none; flex-direction: column; min-height: 100vh; }
        .menu-header { background: var(--burgundy); color: white; padding: 14px 18px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
        .btn-back { background: rgba(255,255,255,0.15); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
        .menu-header h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
        .menu-content { padding: 20px; flex: 1; }
        .category-block { margin-bottom: 24px; }
        .category-name { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; border-bottom: 1px solid rgba(96,20,36,0.2); padding-bottom: 4px; }
        .product-item { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed rgba(0,0,0,0.08); }
        .product-info { flex: 1; padding-right: 12px; }
        .product-meta { display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: var(--burgundy); }
        .product-desc { font-size: 0.78rem; color: #55484a; margin-top: 3px; font-style: italic; line-height: 1.4; }
        .btn-add { background: var(--burgundy); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }

        /* PANIER */
        .cart-bar { background: var(--burgundy); color: white; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; bottom: 0; cursor: pointer; z-index: 10; }
        .cart-bar-label { font-size: 0.88rem; font-weight: 700; }
        .cart-right { display: flex; align-items: center; gap: 10px; }
        .cart-total-label { font-size: 0.88rem; font-weight: 700; }
        .cart-badge { background: white; color: var(--burgundy); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 800; }
        .cart-panel { background: white; padding: 16px; display: none; }
        .cart-panel.open { display: block; }
        .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #e5e0d8; font-size: 0.88rem; }
        .cart-line-name { flex: 1; }
        .cart-qty-ctrl { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #f3f4f6; border: 1px solid #d1d5db; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: 700; }
        .cart-total-row { display: flex; justify-content: space-between; font-weight: 800; padding-top: 12px; color: var(--burgundy); font-size: 1rem; }
        .btn-send { width: 100%; margin-top: 12px; background: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
        .btn-send:disabled { background: #9ca3af; cursor: not-allowed; }

        /* TABLE INPUT */
        .table-select { background: #fff8f0; border: 2px solid var(--taupe); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .table-select label { font-weight: 700; font-size: 0.88rem; color: var(--burgundy); display: block; margin-bottom: 8px; }
        .table-select select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }

        /* LOADING */
        .loading { text-align: center; padding: 40px; color: #9ca3af; font-style: italic; }

        /* CONFIRMATION */
        .order-confirm { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px; }
        .order-confirm.show { display: flex; }
        .confirm-icon { font-size: 4rem; margin-bottom: 16px; }
        .order-confirm h2 { font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 1.6rem; margin-bottom: 8px; }
        .order-confirm p { color: #6b7280; font-size: 0.9rem; }
        .btn-new-order { margin-top: 24px; background: var(--burgundy); color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
    </style>
</head>
<body>

<!-- SAS -->
<div class="sas-screen" id="view-sas">
    <div class="sas-logo">BH</div>
    <h1>Le Bistrot des Halles</h1>
    <p>Commandez directement depuis votre table</p>
    <div id="sas-buttons" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="loading">Chargement du menu...</div>
    </div>
</div>

<!-- MENU -->
<div class="menu-screen" id="view-menu">
    <div class="menu-header">
        <button class="btn-back" onclick="goBack()">← Retour</button>
        <h2 id="menu-title"></h2>
    </div>
    <div class="menu-content">
        <div class="table-select">
            <label>📍 Votre numéro de table :</label>
            <select id="table-number">
                <option value="">-- Sélectionnez votre table --</option>
                <option value="Table 1">Table 1</option>
                <option value="Table 2">Table 2</option>
                <option value="Table 3">Table 3</option>
                <option value="Table 4">Table 4</option>
                <option value="Table 5">Table 5</option>
                <option value="Table 6">Table 6</option>
                <option value="Table 7">Table 7</option>
                <option value="Table 8">Table 8</option>
                <option value="Bar">Bar</option>
                <option value="Terrasse">Terrasse</option>
            </select>
        </div>
        <div id="menu-items"></div>
    </div>
    <div class="order-confirm" id="order-confirm">
        <div class="confirm-icon">✅</div>
        <h2>Commande envoyée !</h2>
        <p>Le bar a bien reçu votre commande.</p>
        <div style="background:#fff8f0;border:2px solid #b2a48f;border-radius:12px;padding:16px;margin:16px 0;text-align:center;">
            <div style="font-size:0.82rem;color:#6b7280;margin-bottom:4px;">⏱ Temps estimé</div>
            <div id="eta-text" style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#601424;">~10-15 minutes</div>
            <div style="font-size:0.75rem;color:#9ca3af;margin-top:4px;">Estimation basée sur les commandes en cours</div>
        </div>
        <button class="btn-new-order" onclick="resetOrder()">Nouvelle commande</button>
    </div>
    <div class="cart-bar" onclick="toggleCart()" id="cart-bar">
        <span class="cart-bar-label">🛒 Mon panier</span>
        <div class="cart-right">
            <span class="cart-total-label" id="cart-total-label">0.00€</span>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </div>
    <div class="cart-panel" id="cart-panel">
        <div id="cart-lines"></div>
        <div class="cart-total-row"><span>Total</span><span id="cart-grand-total">0.00€</span></div>
        <button class="btn-send" id="btn-send" onclick="sendOrder()">✅ Envoyer la commande</button>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://mvxqpysdbngyazzzdbkc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12eHFweXNkYm5neWF6enpkYmtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyNzgsImV4cCI6MjA5NjkzNDI3OH0.Y0v4pHdGHF6oGMP4AbTyMjIAZLJk-S7iWL0p_SaRJAs';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let appState = { menus: [], categories: [], products: [] };
let cart = {};
let currentMenuId = null;

// ── INIT ──
async function init() {
    await loadState();
    renderSas();
}

async function loadState() {
    try {
        const { data } = await db.from('state').select('*').eq('key', 'app_state').single();
        if (data && data.value) {
            appState = data.value;
        } else {
            // État par défaut si rien en base
            appState = {
                menus: [
                    { id: "m_vins", name: "La Carte des Vins" },
                    { id: "m_cocktails", name: "Les Cocktails & Boissons" }
                ],
                categories: [
                    { id: "c_rouges", menuId: "m_vins", name: "Vins Rouges" },
                    { id: "c_blancs", menuId: "m_vins", name: "Vins Blancs" },
                    { id: "c_creations", menuId: "m_cocktails", name: "Créations du Chef" },
                    { id: "c_softs", menuId: "m_cocktails", name: "Softs Frais" }
                ],
                products: [
                    { id: "p1", catId: "c_rouges", name: "Saint-Émilion Grand Cru", price: 7.50, desc: "Notes boisées, finale veloutée.", isHidden: false },
                    { id: "p2", catId: "c_blancs", name: "Chablis Artisanal", price: 6.00, desc: "Minéral, frais, idéal fruits de mer.", isHidden: false },
                    { id: "p3", catId: "c_creations", name: "Bistrot Mule Signature", price: 9.50, desc: "Vodka infusée au basilic, Ginger Beer, citron vert.", isHidden: false },
                    { id: "p4", catId: "c_softs", name: "Limonade Maison Menthe", price: 4.00, desc: "Citrons pressés minute, sirop de canne bio.", isHidden: false }
                ]
            };
        }
    } catch(e) { console.error(e); }
}

function renderSas() {
    const c = document.getElementById('sas-buttons');
    c.innerHTML = '';
    appState.menus.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'sas-menu-btn';
        btn.textContent = m.name;
        btn.onclick = () => openMenu(m.id);
        c.appendChild(btn);
    });
}

function openMenu(menuId) {
    currentMenuId = menuId;
    document.getElementById('view-sas').style.display = 'none';
    document.getElementById('view-menu').style.display = 'flex';
    document.getElementById('menu-title').textContent = appState.menus.find(m => m.id === menuId)?.name || '';
    document.getElementById('order-confirm').classList.remove('show');
    document.getElementById('menu-items').style.display = 'block';
    document.getElementById('cart-bar').style.display = 'flex';
    cart = {};
    renderMenu(menuId);
    updateCartUI();
}

function goBack() {
    document.getElementById('view-menu').style.display = 'none';
    document.getElementById('view-sas').style.display = 'flex';
    document.getElementById('cart-panel').classList.remove('open');
}

function renderMenu(menuId) {
    const container = document.getElementById('menu-items');
    container.innerHTML = '';
    appState.categories.filter(c => c.menuId === menuId).forEach(cat => {
        const prods = appState.products.filter(p => p.catId === cat.id && !p.isHidden);
        if (!prods.length) return;
        const block = document.createElement('div');
        block.className = 'category-block';
        block.innerHTML = `<div class="category-name">${cat.name}</div>`;
        prods.forEach(p => {
            block.innerHTML += `
                <div class="product-item">
                    <div class="product-info">
                        <div class="product-meta"><span>${p.name}</span><span>${parseFloat(p.price).toFixed(2)}€</span></div>
                        <div class="product-desc">${p.desc}</div>
                    </div>
                    <button class="btn-add" onclick="addToCart('${p.id}')">+ Ajouter</button>
                </div>`;
        });
        container.appendChild(block);
    });
}

function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
}

function changeQty(id, delta) {
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) delete cart[id];
    updateCartUI();
}

function updateCartUI() {
    const items = Object.entries(cart);
    const total = items.reduce((s, [id, qty]) => {
        const p = appState.products.find(x => x.id === id);
        return s + (p ? parseFloat(p.price) * qty : 0);
    }, 0);
    const count = items.reduce((s, [, q]) => s + q, 0);

    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-total-label').textContent = total.toFixed(2) + '€';
    document.getElementById('cart-grand-total').textContent = total.toFixed(2) + '€';

    const lines = document.getElementById('cart-lines');
    lines.innerHTML = '';
    if (!items.length) {
        lines.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:12px;font-size:0.85rem;">Panier vide</p>';
    } else {
        items.forEach(([id, qty]) => {
            const p = appState.products.find(x => x.id === id);
            if (!p) return;
            lines.innerHTML += `
                <div class="cart-line">
                    <span class="cart-line-name">${p.name}</span>
                    <div class="cart-qty-ctrl">
                        <button class="btn-qty" onclick="changeQty('${id}',-1)">−</button>
                        <span style="min-width:18px;text-align:center;font-weight:700;">${qty}</span>
                        <button class="btn-qty" onclick="changeQty('${id}',1)">+</button>
                        <span style="min-width:48px;text-align:right;font-weight:600;">${(parseFloat(p.price)*qty).toFixed(2)}€</span>
                    </div>
                </div>`;
        });
    }
}

function toggleCart() {
    document.getElementById('cart-panel').classList.toggle('open');
}

async function sendOrder() {
    const table = document.getElementById('table-number').value;
    if (!table) return alert('Veuillez sélectionner votre numéro de table.');
    const items = Object.entries(cart);
    if (!items.length) return alert('Votre panier est vide.');

    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours...';

    const orderItems = items.map(([id, qty]) => {
        const p = appState.products.find(x => x.id === id);
        return { productId: id, name: p?.name, price: parseFloat(p?.price), qty };
    });

    const total = orderItems.reduce((s, i) => s + i.price * i.qty, 0);

    await db.from('orders').insert({
        table_number: table,
        items: orderItems,
        total: total,
        status: 'pending',
        created_at: new Date().toISOString()
    });

    // Calculer ETA basé sur le nombre de commandes en cours
    const { data: activeOrders } = await db.from('orders')
        .select('id').in('status', ['pending', 'preparing']);
    const queueSize = (activeOrders || []).length;
    const etaMin = Math.max(5, 5 + queueSize * 2);
    const etaMax = etaMin + 5;

    // Afficher confirmation avec ETA
    document.getElementById('eta-text').textContent = `~${etaMin}-${etaMax} minutes`;
    document.getElementById('menu-items').style.display = 'none';
    document.getElementById('cart-panel').classList.remove('open');
    document.getElementById('cart-bar').style.display = 'none';
    document.getElementById('order-confirm').classList.add('show');

    btn.disabled = false;
    btn.textContent = '✅ Envoyer la commande';
    cart = {};
    updateCartUI();
}

function resetOrder() {
    openMenu(currentMenuId);
}

init();
</script>
</body>
</html>
