async function importMenu() {
    const btn = document.querySelector('button');
    const result = document.getElementById('result');
    btn.textContent = 'Import en cours...';
    btn.disabled = true;

    try {
        // Essayer d'abord UPDATE sur la ligne existante
        const { data: existing } = await db.from('state').select('id').eq('key', 'app_state').maybeSingle();
        
        let error;
        if (existing) {
            // Mettre à jour la ligne existante
            const res = await db.from('state').update({ value: JSON.stringify(menuData) }).eq('key', 'app_state');
            error = res.error;
        } else {
            // Insérer une nouvelle ligne
            const res = await db.from('state').insert({ key: 'app_state', value: JSON.stringify(menuData) });
            error = res.error;
        }

        if (error) throw error;

        result.className = 'result ok';
        result.textContent = '✅ Menu importé avec succès ! 3 menus, 15 catégories, 88 articles.';
        result.style.display = 'block';
        btn.textContent = '✅ Importé !';
    } catch(e) {
        result.className = 'result err';
        result.textContent = '❌ Erreur : ' + e.message;
        result.style.display = 'block';
        btn.textContent = 'Réessayer';
        btn.disabled = false;
    }
}
